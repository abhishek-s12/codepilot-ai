# A generic, single database configuration.

[alembic]
# path to migration scripts
script_location = migrations

# template used to generate new migration files
# file_template = %%(rev)s_%%(slug)s

# sys.path pathprefix to prepend to sys.path prior to instantiating the engines.
# Path is relative to the directory containing alembic.ini before any other addresses.
prepend_sys_path = .

# timezone to use when rendering the date within the migration file as
# well as the filename.
# string value is passed to dateutil.tz.gettz()
# leave blank for local time
# timezone =

# version location specification; this defaults
# to migrations/versions.  When using multiple version
# directories, paths must be absolute or relative to should_respect_base_url
# version_locations = %(here)s/bar:%(here)s/bat:migrations/versions

# version path separator; defaults to "os.pathsep".
# Use a space to allow newline-separated length of paths
# version_path_separator = :

# set to 'true' to run the environment during
# the 'revision' command, regardless of autogenerate
# revision_environment = false

# set to 'true' to allow empty migrations to be generated;
# when false, 'alembic revision' will abort if no migrations are detected.
# prevent_empty = false

# logging configuration
[loggers]
keys = root,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stdout,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
