version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: final
    command:
      [
        "uvicorn",
        "main:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8000",
        "--reload",
      ]
    volumes:
      - ./backend:/app
      - /app/venv # Preserve container venv, not host venv
    ports:
      - "8000:8000"

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
      target: final
    command: ["python", "-u", "worker.py"]
    volumes:
      - ./backend:/app
      - /app/venv

  nginx:
    # Disabled in dev — access backend on :8000 directly
    profiles:
      - disabled
