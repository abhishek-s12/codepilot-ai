version: "3.9"

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

x-app-env: &app-env
  env_file: ./backend/.env
  environment:
    DATABASE_URL: postgresql://${POSTGRES_USER:-codepilot}:${POSTGRES_PASSWORD:-codepilot_pass_123}@postgres:5432/${POSTGRES_DB:-codepilot}
    REDIS_URL: redis://redis:6379/0
    QDRANT_HOST: qdrant
    QDRANT_PORT: 6333
    S3_ENDPOINT_URL: http://minio:9000

services:
  # ── Infrastructure ──────────────────────────────────────────────

  postgres:
    image: postgres:15-alpine
    container_name: codepilot-postgres
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-codepilot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-codepilot_pass_123}
      POSTGRES_DB: ${POSTGRES_DB:-codepilot}
    ports:
      - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-codepilot}"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *default-logging
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: codepilot-redis
    command: redis-server --save 60 1 --loglevel warning
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *default-logging
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    container_name: codepilot-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "bash", "-c", "</dev/tcp/127.0.0.1/6333"]
      interval: 15s
      timeout: 5s
      retries: 5
    logging: *default-logging
    restart: unless-stopped

  minio:
    image: minio/minio:RELEASE.2024-01-28T22-35-53Z
    container_name: codepilot-minio
    env_file: .env
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minio_user}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minio_password_123}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 15s
      timeout: 5s
      retries: 5
    logging: *default-logging
    restart: unless-stopped

  # ── DB Migration (runs once, then exits) ────────────────────────

  migrate:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: codepilot-backend:latest
    container_name: codepilot-migrate
    <<: *app-env
    command: ["alembic", "upgrade", "head"]
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  # ── Application ──────────────────────────────────────────────────

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: codepilot-backend:latest
    container_name: codepilot-backend
    <<: *app-env
    volumes:
      - repo_data:/app/repos
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      minio:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health/live || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 3
    logging: *default-logging
    restart: unless-stopped

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: codepilot-backend:latest
    container_name: codepilot-worker
    command:
      - celery
      - -A
      - celery_app
      - worker
      - --loglevel=info
      - -Q
      - indexing,default
      - --concurrency=4
      - --hostname=codepilot-worker@%h
    <<: *app-env
    volumes:
      - repo_data:/app/repos
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      minio:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    logging: *default-logging
    restart: unless-stopped

  # ── Celery Flower (Task Monitoring UI) ──────────────────────────────────────

  flower:
    image: mher/flower:2.0
    container_name: codepilot-flower
    command: celery --broker=redis://redis:6379/0 flower --port=5555
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
      FLOWER_BASIC_AUTH: admin:codepilot_flower_pass
    ports:
      - "5555:5555"
    depends_on:
      redis:
        condition: service_healthy
    logging: *default-logging
    restart: unless-stopped

  nginx:
    image: nginx:1.25-alpine
    container_name: codepilot-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost/health/live || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    logging: *default-logging
    restart: unless-stopped

  # ── Observability Stack (Phase 9) ─────────────────────────────────────────

  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: codepilot-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--web.enable-lifecycle'
    healthcheck:
      test: ["CMD-SHELL", "wget -q --tries=1 http://localhost:9090/-/healthy -O /dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
    logging: *default-logging
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.4.0
    container_name: codepilot-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-codepilot_grafana_pass}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_PATHS_PROVISIONING: /etc/grafana/provisioning
    volumes:
      - grafana_data:/var/lib/grafana
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
      - loki
    healthcheck:
      test: ["CMD-SHELL", "wget -q --tries=1 http://localhost:3000/api/health -O /dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
    logging: *default-logging
    restart: unless-stopped

  loki:
    image: grafana/loki:2.9.0
    container_name: codepilot-loki
    ports:
      - "3100:3100"
    volumes:
      - ./observability/loki-config.yml:/etc/loki/config.yml:ro
      - loki_data:/loki
    command: -config.file=/etc/loki/config.yml
    healthcheck:
      test: ["CMD-SHELL", "wget -q --tries=1 http://localhost:3100/ready -O /dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
    logging: *default-logging
    restart: unless-stopped

  promtail:
    image: grafana/promtail:2.9.0
    container_name: codepilot-promtail
    volumes:
      - ./observability/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki
    logging: *default-logging
    restart: unless-stopped

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.96.0
    container_name: codepilot-otel-collector
    ports:
      - "4317:4317"   # OTLP gRPC receiver
      - "4318:4318"   # OTLP HTTP receiver
      - "8889:8889"   # Prometheus metrics exporter
    volumes:
      - ./observability/otel-collector.yml:/etc/otelcol/config.yaml:ro
    depends_on:
      - loki
      - prometheus
    logging: *default-logging
    restart: unless-stopped

# ── Volumes ──────────────────────────────────────────────────────────
volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  minio_data:
  repo_data:
  prometheus_data:
  grafana_data:
  loki_data:
