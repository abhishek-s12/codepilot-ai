version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: codepilot-postgres
    environment:
      POSTGRES_USER: codepilot
      POSTGRES_PASSWORD: codepilot_pass_123
      POSTGRES_DB: codepilot
    ports:
      - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    container_name: codepilot-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: codepilot-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: codepilot-worker
    command: ["python", "worker.py"]
    environment:
      DATABASE_URL: postgresql://codepilot:codepilot_pass_123@postgres:5432/codepilot
      REDIS_URL: redis://redis:6379/0
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      LLM_API_KEY: ${LLM_API_KEY}
      S3_ENDPOINT_URL: http://minio:9000
      S3_ACCESS_KEY: minio_user
      S3_SECRET_KEY: minio_password_123
    volumes:
      - ./backend:/app
    depends_on:
      - postgres
      - redis
      - qdrant
      - minio
    restart: unless-stopped

  minio:
    image: minio/minio:RELEASE.2024-01-28T22-35-53Z
    container_name: codepilot-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minio_user
      MINIO_ROOT_PASSWORD: minio_password_123
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    restart: unless-stopped

volumes:
  postgres_data:
  qdrant_data:
  redis_data:
  minio_data:
