apiVersion: v2
name: codepilot-ai
description: CodePilot AI — Production Helm Chart
type: application
version: 1.0.0
appVersion: "1.0.0"

keywords:
  - codepilot
  - ai
  - code-intelligence
  - fastapi

maintainers:
  - name: CodePilot AI Team

dependencies:
  - name: postgresql
    version: "15.5.x"
    repository: "https://charts.bitnami.com/bitnami"
    condition: postgresql.enabled

  - name: redis
    version: "19.x.x"
    repository: "https://charts.bitnami.com/bitnami"
    condition: redis.enabled

  - name: minio
    version: "14.x.x"
    repository: "https://charts.bitnami.com/bitnami"
    condition: minio.enabled
