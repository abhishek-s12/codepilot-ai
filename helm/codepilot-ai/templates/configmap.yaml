apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "codepilot-ai.fullname" . }}-config
  labels:
    {{- include "codepilot-ai.labels" . | nindent 4 }}
data:
  CORS_ORIGINS: {{ .Values.config.corsOrigins | quote }}
  LLM_BASE_URL: {{ .Values.config.llmBaseUrl | quote }}
  LLM_MODEL: {{ .Values.config.llmModel | quote }}
  LLM_APP_NAME: {{ .Values.config.llmAppName | quote }}
  LLM_SITE_URL: {{ .Values.config.llmSiteUrl | quote }}
  ALLOW_DEV_SANDBOX_LOGIN: {{ .Values.config.allowSandboxLogin | quote }}
  ENFORCE_STRICT_AUTH: {{ .Values.config.enforceStrictAuth | quote }}
  ENVIRONMENT: {{ .Values.config.environment | quote }}
  DATABASE_URL: {{ include "codepilot-ai.databaseUrl" . | quote }}
  REDIS_URL: {{ include "codepilot-ai.redisUrl" . | quote }}
  QDRANT_HOST: {{ printf "%s-qdrant" (include "codepilot-ai.fullname" .) | quote }}
  QDRANT_PORT: "6333"
  S3_ENDPOINT_URL: {{ include "codepilot-ai.minioUrl" . | quote }}
  S3_BUCKET_NAME: "codepilot-storage"
