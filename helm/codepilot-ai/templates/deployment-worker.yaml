apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "codepilot-ai.fullname" . }}-worker
  labels:
    {{- include "codepilot-ai.labels" . | nindent 4 }}
    app.kubernetes.io/component: worker
spec:
  replicas: {{ .Values.worker.replicaCount }}
  selector:
    matchLabels:
      {{- include "codepilot-ai.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: worker
  template:
    metadata:
      labels:
        {{- include "codepilot-ai.labels" . | nindent 8 }}
        app.kubernetes.io/component: worker
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "codepilot-ai.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: worker
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - celery
            - -A
            - celery_app
            - worker
            - --loglevel=info
            - -Q
            - {{ .Values.worker.queues | quote }}
            - --concurrency={{ .Values.worker.concurrency }}
            - --hostname=codepilot-worker@%h
          envFrom:
            - configMapRef:
                name: {{ include "codepilot-ai.fullname" . }}-config
            - secretRef:
                name: {{ include "codepilot-ai.fullname" . }}-secrets
          resources:
            {{- toYaml .Values.worker.resources | nindent 12 }}
          volumeMounts:
            - name: repo-storage
              mountPath: /app/repos
          livenessProbe:
            exec:
              command:
                - celery
                - -A
                - celery_app
                - inspect
                - ping
                - -d
                - codepilot-worker@$HOSTNAME
            initialDelaySeconds: 30
            periodSeconds: 60
            failureThreshold: 3
            timeoutSeconds: 10
      volumes:
        - name: repo-storage
          emptyDir: {}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
