apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "codepilot-ai.fullname" . }}-migrate
  labels:
    {{- include "codepilot-ai.labels" . | nindent 4 }}
    app.kubernetes.io/component: migration
  annotations:
    # Runs before every install and upgrade, ensuring schema is always up to date
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  ttlSecondsAfterFinished: 300
  backoffLimit: 3
  template:
    metadata:
      labels:
        {{- include "codepilot-ai.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: migration
    spec:
      restartPolicy: OnFailure
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "codepilot-ai.serviceAccountName" . }}
      initContainers:
        - name: wait-for-db
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z {{ include "codepilot-ai.fullname" . }}-postgresql 5432; do
                echo "Waiting for PostgreSQL..."; sleep 2;
              done
      containers:
        - name: migrate
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - alembic
            - upgrade
            - head
          envFrom:
            - configMapRef:
                name: {{ include "codepilot-ai.fullname" . }}-config
            - secretRef:
                name: {{ include "codepilot-ai.fullname" . }}-secrets
