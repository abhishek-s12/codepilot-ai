apiVersion: v1
kind: Secret
metadata:
  name: {{ include "codepilot-ai.fullname" . }}-secrets
  labels:
    {{- include "codepilot-ai.labels" . | nindent 4 }}
type: Opaque
stringData:
  LLM_API_KEY: {{ .Values.secrets.llmApiKey | quote }}
  JWT_SECRET: {{ .Values.secrets.jwtSecret | quote }}
  GITHUB_CLIENT_ID: {{ .Values.secrets.githubClientId | quote }}
  GITHUB_CLIENT_SECRET: {{ .Values.secrets.githubClientSecret | quote }}
  GOOGLE_CLIENT_ID: {{ .Values.secrets.googleClientId | quote }}
  GOOGLE_CLIENT_SECRET: {{ .Values.secrets.googleClientSecret | quote }}
  S3_ACCESS_KEY: {{ .Values.minio.auth.rootUser | quote }}
  S3_SECRET_KEY: {{ .Values.minio.auth.rootPassword | quote }}
  FLOWER_BASIC_AUTH: {{ .Values.secrets.flowerBasicAuth | quote }}
  GRAFANA_ADMIN_PASSWORD: {{ .Values.secrets.grafanaAdminPassword | quote }}
