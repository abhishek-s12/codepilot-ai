apiVersion: v1
kind: Service
metadata:
  name: {{ include "codepilot-ai.fullname" . }}-backend
  labels:
    {{- include "codepilot-ai.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  type: {{ .Values.backend.service.type }}
  ports:
    - port: {{ .Values.backend.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "codepilot-ai.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: backend
