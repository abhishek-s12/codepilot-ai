global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

scrape_configs:
  - job_name: "codepilot-backend"
    static_configs:
      - targets: ["backend:8000"]
    metrics_path: /metrics

  - job_name: "celery-flower"
    static_configs:
      - targets: ["flower:5555"]
    metrics_path: /metrics

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
